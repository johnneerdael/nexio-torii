<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexio Torii Setup</title>

    <link rel="icon" type="image/png" href="/nexio-torii.png">
    <link rel="shortcut icon" href="/nexio-torii.png">
    <link rel="apple-touch-icon" href="/nexio-torii.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Kaisei Tokumin", serif;
            background-color: #050505;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .bg-layer {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(66, 165, 245, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(30, 136, 229, 0.15), transparent 25%),
                radial-gradient(circle at 50% 50%, rgba(255, 215, 0, 0.05), transparent 50%);
            z-index: -2;
            pointer-events: none;
            will-change: transform;
            animation: backgroundShiftGPU 15s ease-in-out infinite alternate;
        }

        @keyframes backgroundShiftGPU {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-10%, 0, 0); }
        }

        .glass-card {
            background: rgba(15, 15, 20, 0.85); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 1), inset 0 0 20px rgba(66, 165, 245, 0.02);
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            animation: float 6s ease-in-out infinite;
            margin-top: auto;
            margin-bottom: auto;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateZ(0); }
            50% { transform: translateY(-12px) translateZ(0); }
        }

        .perf-blob-1, .perf-blob-2 {
            position: fixed;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: -1;
        }

        .perf-blob-1 {
            top: 25%;
            left: 25%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 60%);
            animation: pulseOpacity 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .perf-blob-2 {
            bottom: 25%;
            right: 25%;
            transform: translate(50%, 50%);
            background: radial-gradient(circle, rgba(8,145,178,0.15) 0%, transparent 60%);
            animation: pulseOpacity 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            animation-delay: 2s;
        }

        @keyframes pulseOpacity {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @media (max-width: 768px) {
            .bg-layer { animation: none; }
            .glass-card { animation: none; margin-top: 2rem; margin-bottom: 2rem; }
            .perf-blob-1, .perf-blob-2 { display: none; }
        }

        .neon-text {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #42a5f5, 0 0 20px #42a5f5, 0 0 40px #1e88e5;
            font-weight: 800;
        }

        .slogan-calligraphy {
            letter-spacing: 0.3em;
            color: rgba(66, 165, 245, 0.8);
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .brand-logo {
            width: min(100%, 560px);
            max-height: 220px;
            object-fit: contain;
            filter: drop-shadow(0 0 24px rgba(66, 165, 245, 0.55));
        }

        .bg-logo-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 0;
        }

        .bg-logo {
            width: 80%;
            max-width: 800px;
            opacity: 0.05;
            transform: rotate(-5deg);
            -webkit-mask-image: radial-gradient(circle, black 30%, transparent 70%);
            mask-image: radial-gradient(circle, black 30%, transparent 70%);
            mix-blend-mode: screen;
        }

        .input-glass {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
            -webkit-appearance: none;
        }

        .input-glass:focus {
            box-shadow: 0 0 15px rgba(66, 165, 245, 0.3);
            border-color: rgba(66, 165, 245, 0.6);
            background-color: rgba(0, 0, 0, 0.7);
        }

        .glass-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.4);
            border-radius: 0.3rem;
            outline: none;
            cursor: pointer;
            position: relative;
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            flex-shrink: 0;
        }

        .glass-checkbox:checked {
            background: #42a5f5;
            border-color: #42a5f5;
            box-shadow: 0 0 10px rgba(66, 165, 245, 0.5);
        }

        .glass-checkbox.movie-cb:checked {
            background: #ab47bc;
            border-color: #ab47bc;
            box-shadow: 0 0 10px rgba(171, 71, 188, 0.5);
        }

        .glass-checkbox:checked::after {
            content: "✓";
            position: absolute;
            color: white;
            font-size: 0.8rem;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: sans-serif;
        }

        .btn-neon {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
            background-size: 200% 200%;
            transition: background-position 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
        }

        .btn-neon:hover {
            background-position: 100% 0;
            box-shadow: 0 0 25px rgba(66, 165, 245, 0.6);
            transform: scale(1.02);
        }

        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-card {
            background: rgba(15, 15, 20, 0.95);
            border: 1px solid rgba(66, 165, 245, 0.4);
            box-shadow: 0 0 40px rgba(66, 165, 245, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .show-modal { display: flex !important; opacity: 1 !important; }
        .show-modal .modal-card { transform: scale(1) !important; }

        .copy-box::-webkit-scrollbar { height: 4px; }
        .copy-box::-webkit-scrollbar-thumb { background: rgba(66, 165, 245, 0.5); border-radius: 4px; }
    </style>
</head>
<body class="text-gray-300 min-h-screen flex flex-col p-4 relative border-t-2 border-blue-500/10">

    <div class="bg-layer"></div>

    <div class="fixed top-6 right-6 flex items-center space-x-3 bg-black/80 border border-white/5 rounded-full px-4 py-2 z-50">
        <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-gray-500 animate-pulse"></div>
        <span id="statusText" class="text-[10px] font-mono tracking-widest uppercase text-gray-400">Checking Nyaa...</span>
    </div>

    <div class="bg-logo-container">
        <img src="/nexio-torii.png" class="bg-logo" alt="">
    </div>

    <div class="perf-blob-1"></div>
    <div class="perf-blob-2"></div>

    <div class="glass-card p-8 md:p-12 rounded-[2.5rem] max-w-4xl w-full relative z-10 mx-auto my-8">

        <div class="mb-10 md:mb-14 text-center">
            <img src="/nexio-torii.png" class="brand-logo mx-auto" alt="Nexio Torii">
            <div class="mt-4 border-t border-white/5 w-1/3 mx-auto pt-2 opacity-30"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-14">
            
            <div class="space-y-8">
                
                <div class="space-y-4">
                    <div class="flex items-center justify-between gap-4">

                        <button type="button" id="addDebridService" class="text-[10px] font-mono text-blue-400 hover:text-white uppercase tracking-widest">Add</button>
                    </div>
                    <div id="debridServicesContainer" class="space-y-3"></div>
                </div>

                <div class="pt-2 border-t border-white/5">
                    <label class="flex items-start space-x-4 cursor-pointer group px-2 mt-4">
                        <input type="checkbox" id="enableP2P" class="glass-checkbox mt-1">
                        <div class="flex flex-col text-left">
                            <span class="text-[12px] font-mono text-blue-400 font-bold uppercase tracking-widest transition-colors duration-300">Enable Simple P2P</span>
                            <span class="text-[10px] font-mono text-gray-500 mt-1 leading-relaxed">Warning: Streams directly via BitTorrent. Your IP address will be visible to the swarm. A VPN is highly recommended!</span>
                        </div>
                    </label>
                </div>

                <div class="pt-2 border-t border-white/5">
                    <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-4 mt-4 px-2">Preferred Languages</p>
                    <div class="flex flex-wrap gap-2 px-2" id="language-grid">
                        <label class="cursor-pointer"><input type="checkbox" value="ENG" class="peer hidden lang-cb" checked><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇬🇧 ENG</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="GER" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇩🇪 GER</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="FRE" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇫🇷 FRE</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="ITA" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇮🇹 ITA</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="SPA" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇪🇸 SPA</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="LAT" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">💃🏻 LAT</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="RUS" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇷🇺 RUS</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="POR" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇵🇹 POR</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="ARA" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇸🇦 ARA</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="CHI" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇨🇳 CHI</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="KOR" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇰🇷 KOR</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="HIN" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇮🇳 HIN</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="POL" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇵🇱 POL</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="NLD" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇳🇱 NLD</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="TUR" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇹🇷 TUR</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="VIE" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇻🇳 VIE</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="IND" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇮🇩 IND</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="JPN" class="peer hidden lang-cb"><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">🇯🇵 JPN</div></label>
                    </div>
                </div>
            </div>

            <div class="space-y-8">
                
                <div class="space-y-4">
                    <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-2 pl-2">Stream Filters</p>
                    
                    <div class="pt-2 border-t border-white/5">
                        <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-4 mt-4 px-2">Allowed Resolutions</p>
                        <div class="flex flex-wrap gap-2 px-2 mb-4" id="resolution-grid">
                            <label class="cursor-pointer"><input type="checkbox" value="8K,4K,2K" class="peer hidden res-cb" checked><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">4K+</div></label>
                            <label class="cursor-pointer"><input type="checkbox" value="1080p" class="peer hidden res-cb" checked><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">1080p</div></label>
                            <label class="cursor-pointer"><input type="checkbox" value="720p" class="peer hidden res-cb" checked><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">720p</div></label>
                            <label class="cursor-pointer"><input type="checkbox" value="480p" class="peer hidden res-cb" checked><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">480p</div></label>
                            <label class="cursor-pointer"><input type="checkbox" value="SD" class="peer hidden res-cb" checked><div class="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/5 rounded-md px-2.5 py-1.5 peer-checked:bg-blue-500/20 peer-checked:text-blue-400 peer-checked:border-blue-500/50 transition-colors duration-200 hover:bg-white/5">SD / Unknown</div></label>
                        </div>
                    </div>
                    
                    <label class="flex items-center space-x-4 cursor-pointer group px-2 pb-2">
                        <input type="checkbox" id="hideUncached" class="glass-checkbox">
                        <span class="text-[11px] font-mono text-gray-500 uppercase tracking-widest group-hover:text-blue-400 transition-colors duration-300">Hide Uncached Streams</span>
                    </label>
                </div>

                <div class="pt-2 border-t border-white/5">
                    <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-4 mt-4 px-2">Display & Title Options</p>
                    
                    <label class="flex items-center space-x-4 cursor-pointer group px-2 mb-5">
                        <input type="checkbox" id="useEnglishTitles" class="glass-checkbox">
                        <span class="text-[11px] font-mono text-gray-500 uppercase tracking-widest group-hover:text-blue-400 transition-colors duration-300">Use English Titles</span>
                    </label>

                    <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-3 px-2">Series Catalogs</p>
                    <div class="space-y-3 px-2 mb-5">
                        <label class="flex items-center space-x-4 cursor-pointer group">
                            <input type="checkbox" id="showSeasonalSeries" checked class="glass-checkbox">
                            <span class="text-[11px] font-mono text-gray-500 uppercase tracking-widest group-hover:text-blue-400 transition-colors duration-300">Current Season Anime</span>
                        </label>
                        <label class="flex items-center space-x-4 cursor-pointer group">
                            <input type="checkbox" id="showAiringSeries" checked class="glass-checkbox">
                            <span class="text-[11px] font-mono text-gray-500 uppercase tracking-widest group-hover:text-blue-400 transition-colors duration-300">All Airing Anime</span>
                        </label>
                        <label class="flex items-center space-x-4 cursor-pointer group">
                            <input type="checkbox" id="showTrendingSeries" checked class="glass-checkbox">
                            <span class="text-[11px] font-mono text-gray-500 uppercase tracking-widest group-hover:text-blue-400 transition-colors duration-300">Anilist Trending Series</span>
                        </label>
                        <label class="flex items-center space-x-4 cursor-pointer group">
                            <input type="checkbox" id="showTopSeries" checked class="glass-checkbox">
                            <span class="text-[11px] font-mono text-gray-500 uppercase tracking-widest group-hover:text-blue-400 transition-colors duration-300">Anilist Top Rated Series</span>
                        </label>
                    </div>
                    
                    <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-3 px-2">Movie Catalogs</p>
                    <div class="space-y-3 px-2">
                        <label class="flex items-center space-x-4 cursor-pointer group">
                            <input type="checkbox" id="showTrendingMovies" checked class="glass-checkbox movie-cb">
                            <span class="text-[11px] font-mono text-gray-500 uppercase tracking-widest group-hover:text-[#ab47bc] transition-colors duration-300">Anilist Trending Movies</span>
                        </label>
                        <label class="flex items-center space-x-4 cursor-pointer group">
                            <input type="checkbox" id="showTopMovies" checked class="glass-checkbox movie-cb">
                            <span class="text-[11px] font-mono text-gray-500 uppercase tracking-widest group-hover:text-[#ab47bc] transition-colors duration-300">Anilist Top Rated Movies</span>
                        </label>
                    </div>
                </div>

            </div>
        </div>

        <div class="mt-12 space-y-4 max-w-lg mx-auto">
            <button onclick="install('app')" class="w-full btn-neon py-5 rounded-2xl font-bold text-white text-xl tracking-wider uppercase shadow-xl">
                Install in Stremio
            </button>
            <button onclick="install('web')" class="w-full text-gray-700 hover:text-white transition-colors duration-300 text-[10px] font-bold tracking-widest uppercase">
                open in stremio web
            </button>
            
            <div class="pt-4 border-t border-white/5 mt-6">
                <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-2 text-left px-2">Manifest URL:</p>
                <div class="relative group">
                    <input type="text" id="manifestUrlDisplay" readonly value="Add a debrid service or enable P2P..." class="copy-box w-full input-glass rounded-xl px-4 py-3 text-gray-400 font-mono text-[10px] text-left outline-none opacity-50 cursor-pointer selection:bg-blue-500/30 transition-opacity duration-300">
                    <button onclick="copyManifest()" id="copyBtn" class="absolute right-2 top-1/2 transform -translate-y-1/2 bg-gray-800/80 hover:bg-blue-500 text-white p-1.5 rounded-lg transition-opacity duration-300 opacity-0 group-hover:opacity-100 disabled:opacity-0" title="Copy to clipboard">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 012 2z"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-8 pt-8 border-t border-gray-900 flex justify-center space-x-12 opacity-40 hover:opacity-100 transition-opacity duration-700">
            <a href="https://github.com/johnneerdael/nexio-torii" target="_blank" class="text-gray-600 hover:text-white transition-colors duration-300 transform hover:scale-110" title="GitHub">
                <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
            </a>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-card p-10 rounded-[2rem] max-w-xs w-full text-center">
            <h3 class="text-xl font-bold text-white mb-4 tracking-wider uppercase">Access Denied</h3>
            <p class="text-gray-400 text-sm mb-8 font-mono leading-relaxed">At least one debrid service OR the P2P option is required to establish connection.</p>
            <button onclick="closeModal()" class="w-full bg-white text-black py-3 rounded-xl font-bold uppercase tracking-widest text-xs hover:bg-blue-600 hover:text-white transition-colors duration-300">
                Dismiss
            </button>
        </div>
    </div>

    <script>
        const DEBRID_SERVICES = {
            realdebrid: { name: "RealDebrid", helpText: "API token", apiKeyUrl: "https://real-debrid.com/apitoken" },
            torbox: { name: "TorBox", helpText: "API key", apiKeyUrl: "https://torbox.app/settings" },
            alldebrid: { name: "AllDebrid", helpText: "API key", apiKeyUrl: "https://alldebrid.com/apikeys" },
            premiumize: { name: "Premiumize", helpText: "API key", apiKeyUrl: "https://premiumize.me/account" },
            debridlink: { name: "Debrid-Link", helpText: "API key", apiKeyUrl: "https://debrid-link.com/webapp/apikey" },
            debrider: { name: "Debrider", helpText: "API key", apiKeyUrl: "https://debrider.app/dashboard/account" },
            easydebrid: { name: "EasyDebrid", helpText: "API key", apiKeyUrl: "https://paradise-cloud.com/products/easydebrid" },
            offcloud: { name: "Offcloud", helpText: "Email:password or API key accepted by StremThru", apiKeyUrl: "https://offcloud.com/account" },
            pikpak: { name: "PikPak", helpText: "Email:password accepted by StremThru", apiKeyUrl: "https://mypikpak.com" }
        };

        let debridServiceCounter = 0;

        function updateDebridServiceHelp(row, service) {
            const meta = DEBRID_SERVICES[service] || DEBRID_SERVICES.realdebrid;
            const input = row.querySelector(".debrid-api-key");
            const keyLink = row.querySelector(".debrid-api-key-link");
            input.title = meta.helpText;
            input.placeholder = meta.helpText;
            keyLink.href = meta.apiKeyUrl;
            keyLink.title = `Get ${meta.name} ${meta.helpText}`;
        }

        function addDebridServiceRow(service = "realdebrid", apiKey = "") {
            const container = document.getElementById("debridServicesContainer");
            const entryId = debridServiceCounter++;
            const row = document.createElement("div");
            row.className = "grid grid-cols-[minmax(0,1fr)_auto] sm:grid-cols-[minmax(0,1fr)_minmax(0,1.4fr)_auto_auto] gap-2 items-center";
            row.dataset.entryId = String(entryId);
            row.innerHTML = `
                <select class="debrid-service-select input-glass rounded-xl px-3 py-3 text-white outline-none font-mono text-xs bg-black/40">
                    ${Object.entries(DEBRID_SERVICES).map(([value, meta]) => `<option value="${value}">${meta.name}</option>`).join("")}
                </select>
                <input type="password" class="debrid-api-key input-glass rounded-xl px-4 py-3 text-white outline-none input-glow font-mono text-xs col-span-2 sm:col-span-1" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                <a class="debrid-api-key-link text-[10px] font-mono text-blue-400 hover:text-white uppercase tracking-widest whitespace-nowrap px-2 py-2" target="_blank" rel="noopener noreferrer">Get key</a>
                <button type="button" class="remove-debrid-service text-gray-600 hover:text-red-400 px-2 py-2" title="Remove">×</button>
            `;
            row.querySelector(".debrid-service-select").value = service;
            row.querySelector(".debrid-api-key").value = apiKey;
            updateDebridServiceHelp(row, service);
            row.querySelector(".debrid-service-select").addEventListener("change", event => {
                updateDebridServiceHelp(row, event.target.value);
                generateManifestUrl();
            });
            row.querySelector(".debrid-api-key").addEventListener("input", generateManifestUrl);
            row.querySelector(".remove-debrid-service").addEventListener("click", () => {
                row.remove();
                generateManifestUrl();
            });
            container.appendChild(row);
            generateManifestUrl();
        }

        function getDebridServices() {
            return Array.from(document.querySelectorAll("#debridServicesContainer > div")).map(row => ({
                service: row.querySelector(".debrid-service-select").value,
                apiKey: row.querySelector(".debrid-api-key").value.trim()
            })).filter(entry => entry.service && entry.apiKey);
        }

        function showModal() {
            document.getElementById("modal-overlay").classList.add("show-modal");
        }

        function closeModal() {
            document.getElementById("modal-overlay").classList.remove("show-modal");
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function generateManifestUrlLogic() {
            const debridServices = getDebridServices();
            const enableP2P = document.getElementById("enableP2P").checked;

            const langCheckboxes = document.querySelectorAll(".lang-cb:checked");
            const languages = Array.from(langCheckboxes).map(cb => cb.value);
            
            const resCheckboxes = document.querySelectorAll(".res-cb:checked");
            let resolutions = [];
            resCheckboxes.forEach(cb => {
                resolutions = resolutions.concat(cb.value.split(","));
            });
            
            const useEnglishTitles = document.getElementById("useEnglishTitles").checked;
            const hideUncached = document.getElementById("hideUncached").checked;
            
            const showSeasonalSeries = document.getElementById("showSeasonalSeries").checked;
            const showAiringSeries = document.getElementById("showAiringSeries").checked;
            const showTrendingSeries = document.getElementById("showTrendingSeries").checked;
            const showTopSeries = document.getElementById("showTopSeries").checked;
            const showTrendingMovies = document.getElementById("showTrendingMovies").checked;
            const showTopMovies = document.getElementById("showTopMovies").checked;
            
            const displayBox = document.getElementById("manifestUrlDisplay");
            const copyBtn = document.getElementById("copyBtn");

            if (debridServices.length === 0 && !enableP2P) {
                displayBox.value = "Add a debrid service or enable P2P...";
                displayBox.style.opacity = "0.5";
                copyBtn.disabled = true;
                return null;
            }

            const rawConfig = { 
                useEnglishTitles,
                showSeasonalSeries,
                showAiringSeries,
                showTrendingSeries, 
                showTopSeries, 
                showTrendingMovies, 
                showTopMovies,
                hideUncached,
                resolutions
            };
            
            if (debridServices.length > 0) rawConfig.debridServices = debridServices;
            if (enableP2P) rawConfig.enableP2P = true;
            if (languages.length > 0) rawConfig.language = languages;

            let base64Payload = "";
            try {
                base64Payload = btoa(JSON.stringify(rawConfig))
                    .replace(/\+/g, "-")
                    .replace(/\//g, "_")
                    .replace(/=/g, "");
            } catch (e) {
                console.error("Base64 Encoding Error", e);
                return null;
            }

            const finalConfig = { NexioTorii: base64Payload };
            const configStr = encodeURIComponent(JSON.stringify(finalConfig));
            
            let host = window.location.host;
            if (host.includes("localhost")) {
                host = host.replace("localhost", "127.0.0.1");
            }

            const protocol = window.location.protocol === "https:" ? "https://" : "http://";
            const manifestUrl = `${protocol}${host}/${configStr}/manifest.json`;
            
            displayBox.value = manifestUrl;
            displayBox.style.opacity = "1";
            copyBtn.disabled = false;
            
            return manifestUrl;
        }

        const generateManifestUrl = debounce(generateManifestUrlLogic, 150);

        function copyManifest() {
            const copyText = document.getElementById("manifestUrlDisplay");
            if (copyText && !copyText.value.includes("Add a debrid service")) {
                copyText.select();
                copyText.setSelectionRange(0, 99999);
                try {
                    navigator.clipboard.writeText(copyText.value).then(flashSuccess);
                } catch (err) {
                    document.execCommand("copy");
                    flashSuccess();
                }
            }
        }

        function flashSuccess() {
            const btn = document.getElementById("copyBtn");
            const originalIcon = btn.innerHTML;
            btn.innerHTML = '<svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
            setTimeout(() => { btn.innerHTML = originalIcon; }, 2000);
        }

        async function checkNyaaStatus() {
            const dot = document.getElementById("statusDot");
            const text = document.getElementById("statusText");
            
            try {
                const response = await fetch("/nyaa-status", { method: "GET", cache: "no-store" });
                const data = await response.json();
                
                if (data.status === "online") {
                    dot.className = "w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]";
                    text.textContent = "Nyaa: Online";
                    text.className = "text-[10px] font-mono tracking-widest uppercase text-green-400";
                } else {
                    throw new Error("Offline");
                }
            } catch (error) {
                dot.className = "w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]";
                text.textContent = "Nyaa: Unreachable";
                text.className = "text-[10px] font-mono tracking-widest uppercase text-red-400";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const inputs = [
                "enableP2P",
                "hideUncached", "useEnglishTitles",
                "showSeasonalSeries", "showAiringSeries", "showTrendingSeries", "showTopSeries",
                "showTrendingMovies", "showTopMovies"
            ];

            inputs.forEach(id => {
                document.getElementById(id).addEventListener("change", generateManifestUrl);
            });

            document.getElementById("addDebridService").addEventListener("click", () => addDebridServiceRow());
            addDebridServiceRow("realdebrid", "");

            document.querySelectorAll(".lang-cb").forEach(cb => {
                cb.addEventListener("change", generateManifestUrl);
            });
            
            document.querySelectorAll(".res-cb").forEach(cb => {
                cb.addEventListener("change", generateManifestUrl);
            });
            
            document.getElementById("manifestUrlDisplay").addEventListener("click", function() {
                if (!this.value.includes("Add a debrid service")) {
                    this.select();
                }
            });

            checkNyaaStatus();
            setInterval(checkNyaaStatus, 300000);
            
        });

        function install(type) {
            const manifestUrl = generateManifestUrlLogic();

            if (!manifestUrl) {
                const card = document.querySelector(".glass-card");
                card.style.borderColor = "#42a5f5";
                setTimeout(() => card.style.borderColor = "", 1000);
                showModal();
                return;
            }

            if (type === "app") {
                window.location.href = manifestUrl.replace(/^https?:\/\//i, "stremio://");
            } else {
                window.open("https://web.stremio.com/#/addons?addon=" + encodeURIComponent(manifestUrl));
            }
        }
    </script>
</body>
</html>
