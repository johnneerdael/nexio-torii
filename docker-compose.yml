#===============
# DOCKER COMPOSE
# Ensures internal networking is cleanly separated and logs are properly 
# rotated (max 10mb) to avoid disk exhaustion on smaller VPS machines.
#===============
name: "nexio-torii"

services:
  nexio-torii:
    image: "ghcr.io/johnneerdael/nexio-torii:latest"
    container_name: "nexio_torii"
    restart: "unless-stopped"
    ports:
      - "7002:7002"
    environment:
      - "PORT=7002"
      - "NODE_ENV=production"
      - "STREMTHRU_URL=https://stremthrufortheweak.nhyira.dev/"
    volumes:
      - "nexio-torii-cache:/app/data"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - "stremio-network"

  nexio-torii-ingest:
    image: "ghcr.io/johnneerdael/nexio-torii:latest"
    container_name: "nexio_torii_ingest"
    restart: "unless-stopped"
    environment:
      - "NODE_ENV=production"
      - "CATALOG_DB_PATH=/app/data/catalog.sqlite"
      - "ANIME_MAP_PATH=/app/data/anime/nexio-anime-map-v1.json"
      - "ANIME_MAP_PROVENANCE_PATH=/app/data/anime/nexio-anime-map-provenance.json"
      - "CATALOG_DAILY_INTERVAL_MS=86400000"
      - "TMDB_API_KEY=${TMDB_API_KEY:-}"
      - "TMDB_API_URL=${TMDB_API_URL:-https://api.themoviedb.org/3}"
    volumes:
      - "nexio-torii-cache:/app/data"
    command: ["npm", "run", "catalog:daily", "--", "--limit", "25"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - "stremio-network"

networks:
  stremio-network:
    name: "stremio-internal-net"
    driver: "bridge"

volumes:
  nexio-torii-cache:
    name: "nexio-torii-cache"
